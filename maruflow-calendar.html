<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Maruflow — Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --purple:#B14EF1; --purple-deep:#6C2B9B; --gold:#FFD140; --lavender:#FEF6FF;
  --ink:#1E1E24; --muted:#6E7180; --line:#ECECF2; --bg:#F7F7FB;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Manrope',system-ui,sans-serif}
body{background:var(--bg);color:var(--ink);width:1440px;height:840px;overflow:hidden}
.app{display:flex;height:840px}

/* ---- Sidebar ---- */
.sidebar{width:212px;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;flex:none}
.sb-logo{display:flex;align-items:center;gap:9px;padding:18px 18px 16px}
.sb-logo .emb{width:30px;height:30px;flex:none}
.sb-logo .wm{font-weight:800;font-size:20px;letter-spacing:-.02em}
.sb-collapse{margin-left:auto;color:var(--muted)}
.nav{padding:6px 12px;display:flex;flex-direction:column;gap:2px}
.nav a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:#4a4a55;font-weight:600;font-size:14.5px;text-decoration:none;position:relative}
.nav a svg{width:19px;height:19px;flex:none;stroke:#7a7a86;stroke-width:1.8;fill:none}
.nav a.active{background:linear-gradient(135deg,#f3e7ff,#efe0ff);color:var(--purple-deep)}
.nav a.active svg{stroke:var(--purple-deep)}
.nav a.active::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--purple)}

/* ---- Upcoming panel ---- */
.panel{width:208px;background:#fff;border-right:1px solid var(--line);flex:none;display:flex;flex-direction:column}
.panel-search{margin:14px 14px 8px;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.tabs{display:flex;gap:18px;padding:4px 16px 0;border-bottom:1px solid var(--line)}
.tabs span{padding:9px 2px;font-weight:700;font-size:14px;color:var(--muted);border-bottom:2px solid transparent}
.tabs span.on{color:var(--purple);border-bottom-color:var(--purple)}
.upc{overflow:hidden;padding:6px 14px}
.upc .grp{font-weight:800;font-size:13.5px;color:var(--purple-deep);margin:12px 2px 8px}
.upc .it{margin-bottom:10px}
.upc .it .svc{font-size:12.5px;color:#3c3c46;line-height:1.35}
.upc .it .tm{font-size:11.5px;color:var(--muted);margin-top:1px}
.upc .day{font-size:11px;color:#9a9aa6;margin:6px 2px 2px;border-top:1px dashed var(--line);padding-top:8px}

/* ---- Main ---- */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:54px;border-bottom:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:flex-end;padding:0 20px;gap:14px}
.user{text-align:right;line-height:1.15}
.user .n{font-weight:700;font-size:13.5px}
.user .r{font-size:11.5px;color:var(--muted)}
.user-av{width:34px;height:34px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;padding:6px}
.lock{color:#16a34a}
.brandtag{width:30px;height:30px}

.toolbar{height:52px;display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid var(--line);background:#fff}
.ctl{border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-size:13px;color:#4a4a55;display:flex;align-items:center;gap:8px;font-weight:600;background:#fff}
.ctl .ph{color:var(--muted);font-weight:500}
.addbtn{margin-left:auto;background:var(--purple);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:7px;box-shadow:0 6px 16px rgba(177,78,241,.32)}

.datebar{height:46px;display:flex;align-items:center;gap:8px;padding:0 16px;border-bottom:1px solid var(--line);background:#fff}
.datebar .nav-arrow{width:30px;height:30px;border:1px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--purple);font-weight:700}
.datebar .date{border:1px solid #ecd9ff;background:#faf3ff;color:var(--purple-deep);border-radius:8px;padding:7px 14px;font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:8px}
.datebar .pill{border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600;color:#4a4a55}
.viewtoggle{margin-left:auto;display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.viewtoggle span{padding:7px 16px;font-size:13px;font-weight:700;color:var(--muted)}
.viewtoggle span.on{background:var(--purple);color:#fff}

/* ---- Calendar grid ---- */
.cal{flex:1;display:flex;overflow:hidden}
.timecol{width:62px;flex:none;border-right:1px solid var(--line);background:#fff}
.col-head{height:58px;border-bottom:1px solid var(--line)}
.timecol .slot{height:24px;font-size:11px;color:#9a9aa6;text-align:right;padding-right:8px;transform:translateY(-7px)}
.cols{flex:1;display:flex;overflow:hidden}
.col{flex:1;min-width:0;border-right:1px solid var(--line);position:relative}
.col .chead{height:58px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:#fff}
.col .chead .av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800}
.col .chead .nm{font-size:12px;font-weight:700;color:#3c3c46;max-width:96%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grid-bg{position:absolute;left:0;right:0;top:58px;bottom:0}
.grid-bg .line{height:24px;border-bottom:1px solid #f1f1f6}
.grid-bg .line.hour{border-bottom:1px solid #e4e4ec}
.appts{position:absolute;left:0;right:0;top:58px;bottom:0}
.appt{position:absolute;left:3px;right:3px;border-radius:7px;padding:5px 7px;overflow:hidden;border-left:3px solid;font-size:11px;line-height:1.25}
.appt .tm{font-size:9.5px;opacity:.7;font-weight:600}
.appt .cl{font-weight:800;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.appt .sv{font-size:10px;opacity:.85;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* category colours */
.t-foil{background:#fff3c9;border-color:#e8b500;color:#7a5d00}
.t-colour{background:#f0e2fc;border-color:var(--purple);color:#5a2487}
.t-cut{background:#d9f2ef;border-color:#1aa99a;color:#0f6a60}
.t-blow{background:#fbe1ef;border-color:#e0559e;color:#9c2e6b}
.t-treat{background:#e2f4e4;border-color:#3fb463;color:#256b3e}
.t-event{background:#e3ecfd;border-color:#5a86f0;color:#2f4fa8}
.t-block{background:#ececf1;border-color:#b9b9c4;color:#76767f}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-logo">
      <svg class="emb" viewBox="0 0 579.24 372.83" xmlns="http://www.w3.org/2000/svg"><path fill="#6c2b9b" d="M489.41,372.37l-398.01.45c31.94,0,64.21-16.54,81.44-46.33l116.81-202.22,116.74,202.22c17.23,29.8,51.08,45.88,83.02,45.88"/><path fill="#ffd140" d="M536.38,358.28c-15.4,9.88-32.63,14.55-49.64,14.55-31.94,0-63.12-16.55-80.35-46.34l-116.74-202.22,68.71-101.34c21.6-31.94,69.25-30.18,88.55,3.22l119.88,207.74c24.82,42.9,11.41,97.74-30.41,124.4"/><path fill="#b14ef1" d="M289.66,124.27l-116.81,202.22c-17.23,29.8-48.33,46.34-80.28,46.34-17.01,0-34.24-4.67-49.71-14.55C1.03,331.62-12.37,276.78,12.44,233.88L132.4,26.15c19.3-33.4,66.87-35.16,88.55-3.22l68.71,101.34Z"/></svg>
      <span class="wm">Maruflow</span>
    </div>
    <nav class="nav">
      <a><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>Dashboard</a>
      <a class="active"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Calendar</a>
      <a><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>Customers</a>
      <a><svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M20 4 8.12 15.88M14.47 14.48 20 20M8.12 8.12 12 12"/></svg>Staff</a>
      <a><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>Quick Sale</a>
      <a><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-2.82 1.17V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15H4a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 6 9.4l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 11 4.6V4a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 18 6l.06-.06a2 2 0 1 1 2.83 2.83L20.83 9A1.65 1.65 0 0 0 20.4 11H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>Setup</a>
      <a><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Admin</a>
      <a><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>Reports</a>
      <a><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Waitlist</a>
      <a><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Messages</a>
    </nav>
  </aside>

  <!-- UPCOMING PANEL -->
  <aside class="panel">
    <div class="panel-search"><span>Search customer</span><span>▾</span></div>
    <div class="tabs"><span class="on">Upcoming</span><span>Waitlist</span></div>
    <div class="upc" id="upc"></div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="user"><div class="n">Maruflow Admin</div><div class="r">Super Admin</div></div>
      <div class="user-av"><svg viewBox="0 0 579.24 372.83" xmlns="http://www.w3.org/2000/svg"><path fill="#6c2b9b" d="M489.41,372.37l-398.01.45c31.94,0,64.21-16.54,81.44-46.33l116.81-202.22,116.74,202.22c17.23,29.8,51.08,45.88,83.02,45.88"/><path fill="#ffd140" d="M536.38,358.28c-15.4,9.88-32.63,14.55-49.64,14.55-31.94,0-63.12-16.55-80.35-46.34l-116.74-202.22,68.71-101.34c21.6-31.94,69.25-30.18,88.55,3.22l119.88,207.74c24.82,42.9,11.41,97.74-30.41,124.4"/><path fill="#b14ef1" d="M289.66,124.27l-116.81,202.22c-17.23,29.8-48.33,46.34-80.28,46.34-17.01,0-34.24-4.67-49.71-14.55C1.03,331.62-12.37,276.78,12.44,233.88L132.4,26.15c19.3-33.4,66.87-35.16,88.55-3.22l68.71,101.34Z"/></svg></div>
      <span class="lock">🔒</span>
    </div>

    <div class="toolbar">
      <div class="ctl"><span class="ph">Search customer</span><span>▾</span></div>
      <div class="ctl">👤 All Stylist <span>▾</span></div>
      <div class="ctl">📍 Subiaco <span>▾</span></div>
      <button class="addbtn">+ Add Appointment</button>
    </div>

    <div class="datebar">
      <span class="nav-arrow">‹</span><span class="nav-arrow">«</span>
      <span class="date">📅 Sat, 21 Jun 2026</span>
      <span class="nav-arrow">»</span><span class="nav-arrow">›</span>
      <span class="pill">Today</span>
      <span class="pill">⏱ Set Block Time</span>
      <div class="viewtoggle"><span class="on">Day</span><span>Week</span><span>Month</span></div>
    </div>

    <div class="cal">
      <div class="timecol"><div class="col-head"></div><div id="times"></div></div>
      <div class="cols" id="cols"></div>
    </div>
  </div>
</div>

<script>
const START=8, END=15, SLOT=24; // 8am-3pm, 24px/15min => 96px/hr
const stylists=[
  {n:"Mia Calder",i:"MC",c:"#B14EF1"},
  {n:"Jack Rivera",i:"JR",c:"#1aa99a"},
  {n:"Priya Shah",i:"PS",c:"#e0559e"},
  {n:"Sam Okafor",i:"SO",c:"#5a86f0"},
  {n:"Ella Brooks",i:"EB",c:"#e8b500"},
  {n:"Noah Kim",i:"NK",c:"#3fb463"},
  {n:"Zoe Martin",i:"ZM",c:"#6C2B9B"},
  {n:"Leo Hayes",i:"LH",c:"#d4683a"}
];
// per stylist appts: [start, durMin, client, service, price, type]
const data=[
 [["08:00",45,"Sandy G.","Men's Cut","$80","cut"],["08:45",60,"Renee A.","Regrowth Tint","$145","colour"],["10:00",75,"Kat K.","Signature Haircut & Blow Dry","$185","blow"],["11:30",90,"Isabella Z.","Signature Haircut & Blow Dry","$185","blow"],["13:00",90,"Olivia P.","Personalised Restyle & Blow Dry","$250","cut"],["14:45",30,"Glen D.","Men's Cut","$80","cut"]],
 [["08:00",90,"Gia C.","Regrowth Tint","$145","colour"],["09:30",75,"Rita B.","Signature Haircut & Blow Dry","$185","blow"],["11:15",60,"Paige M.","3/4 Head Foils","$260","foil"],["12:30",75,"Sophie M.","1/2 Head Foils","$225","foil"],["14:00",60,"Rachael S.","Personalised Restyle","$250","cut"]],
 [["08:00",60,"Madeleine N.","Full Head Foils","$305","foil"],["09:15",45,"Chris J.","Men's Cut","$80","cut"],["10:15",75,"Colleen B.","Signature Haircut & Blow Dry","$185","blow"],["11:45",45,"Sue W.","Regrowth Tint","$145","colour"],["12:30",75,"Annette H.","Signature Haircut & Blow Dry","$185","blow"],["14:15",60,"Danuta K.","Regrowth Tint","$145","colour"]],
 [["08:30",60,"Kelli D.","Blonde Scalp Lightening","$205","colour"],["09:45",60,"Heique B.","Regrowth Tint","$140","colour"],["10:45",90,"Lucile D.","Colour & Cut","$255","colour"],["12:30",60,"Jessica N.","Regrowth Tint","$140","colour"],["14:00",60,"Anita M.","Signature Haircut & Blow Dry","$155","blow"]],
 [["08:00",90,"Leigha E.","Global Colour","$190","colour"],["09:30",90,"Michelle S.","Full Head Foils","$300","foil"],["11:15",75,"Alana B.","Signature Haircut & Blow Dry","$165","blow"],["12:45",75,"Lee R.","Full Head Foils","$300","foil"],["14:15",45,"Grace V.","Toner","$45","treat"]],
 [["08:00",75,"Helen H.","Signature Haircut & Blow Dry","$165","blow"],["09:30",60,"Rebecca S.","1/2 Head Foils","$220","foil"],["10:45",75,"Sommer C.","Signature Haircut & Blow Dry","$175","blow"],["12:15",60,"Aidan S.","Men's Cut","$80","cut"],["13:30",75,"Monica S.","1/2 Head Foils","$220","foil"]],
 [["08:00",75,"Chantele D.","Blow Dry & Style","$165","blow"],["09:30",60,"Julie P.","Blow Dry & Style","$97","blow"],["10:45",75,"Sebastian H.","Signature Haircut & Blow Dry","$175","blow"],["12:30",45,"Elina T.","Blow Dry & Roller Set","$127","blow"],["13:30",90,"Andrea W.","Balayage","$260","foil"]],
 [["09:30",75,"Kelly K.","Event Upstyle","$145","event"],["10:45",60,"Lyn G.","Signature Haircut & Blow Dry","$145","blow"],["11:45",75,"Leah K.","Full Head Foils","$290","foil"],["13:15",90,"Christina V.","Blow Dry & Style","$97","blow"],["14:45",30,"Max P.","Toner","$40","treat"]]
];
function mins(t){const[h,m]=t.split(":").map(Number);return (h*60+m)-(START*60);}
const cols=document.getElementById('cols');
stylists.forEach((s,idx)=>{
  const col=document.createElement('div');col.className='col';
  let bg='<div class="grid-bg">';
  for(let i=0;i<(END-START)*4;i++){bg+='<div class="line'+(i%4===0?' hour':'')+'"></div>';}
  bg+='</div>';
  let ap='<div class="appts">';
  (data[idx]||[]).forEach(a=>{
    const top=mins(a[0])*(SLOT/15);
    const h=a[1]*(SLOT/15)-3;
    const to12=t=>{let[H,m]=t.split(":").map(Number);const ap=H>=12?'pm':'am';H=H%12||12;return H+(m?':'+String(m).padStart(2,'0'):'')+ap;};
    ap+='<div class="appt t-'+a[5]+'" style="top:'+top+'px;height:'+h+'px"><div class="tm">'+to12(a[0])+'</div><div class="cl">'+a[2]+'</div><div class="sv">'+a[3]+' · '+a[4]+'</div></div>';
  });
  ap+='</div>';
  col.innerHTML='<div class="chead"><div class="av" style="background:'+s.c+'">'+s.i+'</div><div class="nm">'+s.n+'</div></div>'+bg+ap;
  cols.appendChild(col);
});
const times=document.getElementById('times');
for(let h=START;h<END;h++){for(let q=0;q<4;q++){const d=document.createElement('div');d.className='slot';if(q===0){let H=h%12||12;d.textContent=H+':00 '+(h>=12?'PM':'AM');}times.appendChild(d);}}
// upcoming
const upc=[
 {g:"Imogen R.",items:[["Full Head Foils / Mia","9:00 AM"],["Blow Dry & Style / Leo","12:45 PM"],["Metal Detox Treatment / Mia","2:00 PM"]],day:"Thu, 19 Jun 2026"},
 {g:"Annabel T.",items:[["Blow Dry & Event Upstyle","10:00 AM"],["Natural Glow Makeup / Leo","11:15 AM"]],day:"Thu, 19 Jun 2026"},
 {g:"Lily S.",items:[["Full Head Foils / Priya","10:00 AM"],["Signature Cut & Blow Dry","1:00 PM"]],day:"Thu, 19 Jun 2026"}
];
const ue=document.getElementById('upc');
upc.forEach(u=>{let h='<div class="grp">'+u.g+'</div>';u.items.forEach(it=>{h+='<div class="it"><div class="svc">'+it[0]+'</div><div class="tm">'+it[1]+'</div></div>';});h+='<div class="day">'+u.day+'</div>';ue.innerHTML+=h;});
</script>
</body>
