<style>
:root{--purple:#B14EF1;--purple-deep:#6C2B9B;--gold:#FFD140;--ink:#1E1E24;--muted:#6E7180;--line:#ECECF2;--bg:#F7F7FB;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Manrope',system-ui,sans-serif}
body{background:var(--bg);color:var(--ink);width:1440px;height:760px;overflow:hidden}
.app{display:flex;height:760px}
.sidebar{width:212px;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;flex:none}
.sb-logo{display:flex;align-items:center;gap:10px;padding:18px 18px 16px}
.sb-logo .emb{width:28px;height:28px;flex:none}.sb-logo .wm{font-weight:800;font-size:20px;letter-spacing:-.02em}
.nav{padding:6px 12px;display:flex;flex-direction:column;gap:2px}
.nav a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:#4a4a55;font-weight:600;font-size:14.5px;position:relative}
.nav a svg.ic{width:19px;height:19px;flex:none;stroke:#7a7a86;stroke-width:1.8;fill:none}
.nav a.active{background:linear-gradient(135deg,#f3e7ff,#efe0ff);color:var(--purple-deep)}.nav a.active svg.ic{stroke:var(--purple-deep)}
.nav a.active::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--purple)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:56px;border-bottom:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:flex-end;padding:0 20px;gap:14px}
.user{text-align:right;line-height:1.15}.user .n{font-weight:700;font-size:13.5px}.user .r{font-size:11.5px;color:var(--muted)}
.user-av{width:34px;height:34px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;padding:6px}
.msgwrap{flex:1;display:flex;min-height:0}
.chatlist{width:352px;flex:none;border-right:1px solid var(--line);background:#fff;display:flex;flex-direction:column}
.cl-search{margin:16px;border:1px solid var(--line);border-radius:10px;padding:11px 14px;font-size:14px;color:var(--muted);display:flex;align-items:center;gap:10px}
.cl-head{display:flex;align-items:center;gap:8px;padding:2px 16px 10px}.cl-head h2{font-size:19px;font-weight:800;flex:1}
.chip{font-size:12.5px;font-weight:700;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:5px 13px}
.chip.on{background:var(--purple);color:#fff;border-color:var(--purple)}
.chats{overflow:hidden;flex:1}
.chat{display:flex;gap:11px;align-items:flex-start;padding:11px 16px;border-bottom:1px solid #f4f4f8;position:relative}
.chat.active{background:#f6ecff}.chat.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--purple)}
.ava{width:38px;height:38px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.chat .cmid{flex:1;min-width:0}.chat .cn{font-size:14px;font-weight:700}.chat .cp{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat .cr{text-align:right;flex:none}.chat .cd{font-size:11.5px;color:#9a9aa6}.chat .ct{font-size:11.5px;color:#9a9aa6;margin-top:14px}
.chat.active .cn,.chat.active .cd{color:var(--purple-deep)}
.conv{flex:1;display:flex;flex-direction:column;min-width:0;background:#fcfbfe}
.conv-head{height:70px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 22px;background:#fff}
.conv-head .ava{width:40px;height:40px;background:#f3e7ff;color:var(--purple-deep)}
.conv-head .ci .n{font-weight:800;font-size:16px}.conv-head .ci .e{font-size:12.5px;color:var(--muted)}
.conv-head .cmeta{margin-left:auto;text-align:right}.conv-head .cmeta .p{font-weight:700;font-size:14px}.conv-head .cmeta .lm{font-size:11.5px;color:var(--muted);margin-top:2px}
.thread{flex:1;overflow:hidden;padding:18px 24px;display:flex;flex-direction:column;gap:13px;justify-content:flex-end}
.divider{align-self:center;background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 14px;font-size:12px;color:var(--muted);font-weight:600}
.row{display:flex;align-items:flex-end;gap:9px}
.row.out{flex-direction:row-reverse}
.bub{max-width:60%;border-radius:16px;padding:12px 16px;font-size:13.5px;line-height:1.5}
.row.out .bub{background:linear-gradient(135deg,#b14ef1,#9b3fe0);color:#fff;border-radius:16px 16px 4px 16px;box-shadow:0 6px 18px rgba(177,78,241,.22)}
.row.in .bub{background:#fff;border:1px solid var(--line);color:var(--ink);border-radius:16px 16px 16px 4px;box-shadow:0 3px 10px rgba(30,30,36,.05)}
.bub a{color:inherit;text-decoration:underline;word-break:break-all}
.bub .stamp{display:block;text-align:right;font-size:10.5px;margin-top:7px}
.row.out .stamp{opacity:.75}.row.in .stamp{color:#a3a3ad}
.bav{width:30px;height:30px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center}
.bav.salon{background:#fff;border:1px solid var(--line);padding:5px}
.bav.client{background:#f6d36b;color:#5a4a00;font-size:11px;font-weight:800}
.composer{border-top:1px solid var(--line);background:#fff;padding:14px 22px;display:flex;gap:12px;align-items:center}
.composer .field{flex:1;border:1px solid var(--line);border-radius:10px;padding:12px 16px;color:var(--muted);font-size:14px}
.sendbtn{background:var(--purple);color:#fff;border:none;border-radius:10px;padding:12px 26px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;box-shadow:0 6px 16px rgba(177,78,241,.3)}
